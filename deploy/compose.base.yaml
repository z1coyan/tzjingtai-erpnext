x-customizable-image: &customizable_image
  image: ${CUSTOM_IMAGE:-synie-erpnext}:${CUSTOM_TAG:-latest}
  pull_policy: ${PULL_POLICY:-never}
  restart: ${RESTART_POLICY:-unless-stopped}
  build:
    context: ..
    dockerfile: build/Containerfile
    args:
      FRAPPE_BRANCH: ${FRAPPE_BRANCH:-version-16}
      GITHUB_PROXY: ${GITHUB_PROXY:-}
      APT_MIRROR: ${APT_MIRROR:-}
      PIP_INDEX_URL: ${PIP_INDEX_URL:-}
      PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
      NPM_REGISTRY: ${NPM_REGISTRY:-}
      NVM_INSTALL_SCRIPT: ${NVM_SOURCE:-https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.5/install.sh}
      NODE_MIRROR: ${NODE_MIRROR:-}
      WKHTMLTOPDF_MIRROR: ${WKHTMLTOPDF_MIRROR:-https://github.com/wkhtmltopdf/packaging/releases/download}
      REGISTRY_MIRROR: ${REGISTRY_MIRROR:-}

x-depends-on-configurator: &depends_on_configurator
  depends_on:
    configurator:
      condition: service_completed_successfully

x-backend-defaults: &backend_defaults
  <<: [*depends_on_configurator, *customizable_image]
  volumes:
    - sites:/home/frappe/frappe-bench/sites

services:
  configurator:
    <<: *backend_defaults
    entrypoint: ["/usr/local/bin/configurator-init.sh"]
    command: []
    environment:
      DB_HOST: ${DB_HOST:-}
      DB_PORT: ${DB_PORT:-}
      REDIS_CACHE: ${REDIS_CACHE:-}
      REDIS_QUEUE: ${REDIS_QUEUE:-}
      SOCKETIO_PORT: 9000
    depends_on: {}
    restart: on-failure

  backend:
    <<: *backend_defaults

  frontend:
    <<: *customizable_image
    command:
      - nginx-entrypoint.sh
    ports:
      - "127.0.0.1:${HTTP_PUBLISH_PORT:-8080}:8080"
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      FRAPPE_SITE_NAME_HEADER: ${FRAPPE_SITE_NAME_HEADER:-$$host}
      UPSTREAM_REAL_IP_ADDRESS: ${UPSTREAM_REAL_IP_ADDRESS:-127.0.0.1}
      UPSTREAM_REAL_IP_HEADER: ${UPSTREAM_REAL_IP_HEADER:-X-Forwarded-For}
      UPSTREAM_REAL_IP_RECURSIVE: ${UPSTREAM_REAL_IP_RECURSIVE:-off}
      PROXY_READ_TIMEOUT: ${PROXY_READ_TIMEOUT:-120}
      CLIENT_MAX_BODY_SIZE: ${CLIENT_MAX_BODY_SIZE:-50m}
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    depends_on:
      - backend
      - websocket

  websocket:
    <<: [*depends_on_configurator, *customizable_image]
    command:
      - node
      - /home/frappe/frappe-bench/apps/frappe/socketio.js
    volumes:
      - sites:/home/frappe/frappe-bench/sites

  queue-short:
    <<: *backend_defaults
    command: bench worker --queue short,default

  queue-long:
    <<: *backend_defaults
    command: bench worker --queue long,default,short

  scheduler:
    <<: *backend_defaults
    command: bench schedule

volumes:
  sites:
