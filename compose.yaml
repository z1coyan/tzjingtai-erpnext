# 生产部署用 compose 文件（合并 base + mariadb + redis）
# Dokploy 可直接使用此文件，在服务器上构建镜像并部署
# 所有配置通过环境变量（.env 或 Dokploy UI）注入
#
# 注意：build 只定义在 configurator 上，其他服务共享同名镜像，
# 避免 BuildKit 并行构建同一镜像时报 "already exists" 错误。

x-customizable-image: &customizable_image
  image: ${CUSTOM_IMAGE:-tzjingtai-erpnext}:${CUSTOM_TAG:-latest}
  pull_policy: ${PULL_POLICY:-never}
  restart: ${RESTART_POLICY:-unless-stopped}

x-depends-on-configurator: &depends_on_configurator
  depends_on:
    configurator:
      condition: service_completed_successfully

x-backend-defaults: &backend_defaults
  <<: [*depends_on_configurator, *customizable_image]
  volumes:
    - sites:/home/frappe/frappe-bench/sites

services:
  configurator:
    <<: *backend_defaults
    build:
      context: .
      dockerfile: build/Containerfile
      args:
        FRAPPE_BRANCH: ${FRAPPE_BRANCH:-version-16}
        GITHUB_PROXY: ${GITHUB_PROXY:-}
        APT_MIRROR: ${APT_MIRROR:-}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
        NPM_REGISTRY: ${NPM_REGISTRY:-}
        NVM_INSTALL_SCRIPT: ${NVM_SOURCE:-https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.5/install.sh}
        NODE_MIRROR: ${NODE_MIRROR:-}
        WKHTMLTOPDF_MIRROR: ${WKHTMLTOPDF_MIRROR:-https://github.com/wkhtmltopdf/packaging/releases/download}
        REGISTRY_MIRROR: ${REGISTRY_MIRROR:-}
    # 唯一放开的 deploy-time 通道 —— 见 CLAUDE.md「app 安装完全由 configurator 自动完成」。
    # 脚本负责：写 common_site_config、同步 sites-assets、flushall redis-cache、
    # 自动 install-app。禁止改成在这里 inline 跑命令绕过它。
    entrypoint:
      - bash
      - /usr/local/bin/configurator-init.sh
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      SOCKETIO_PORT: 9000
    depends_on:
      db:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
    restart: on-failure

  backend:
    <<: *backend_defaults

  frontend:
    <<: *customizable_image
    command:
      - nginx-entrypoint.sh
    ports:
      - "${HTTP_PUBLISH_PORT:-8080}:8080"
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      FRAPPE_SITE_NAME_HEADER: ${FRAPPE_SITE_NAME_HEADER:-$$host}
      UPSTREAM_REAL_IP_ADDRESS: ${UPSTREAM_REAL_IP_ADDRESS:-127.0.0.1}
      UPSTREAM_REAL_IP_HEADER: ${UPSTREAM_REAL_IP_HEADER:-X-Forwarded-For}
      UPSTREAM_REAL_IP_RECURSIVE: ${UPSTREAM_REAL_IP_RECURSIVE:-off}
      PROXY_READ_TIMEOUT: ${PROXY_READ_TIMEOUT:-120}
      CLIENT_MAX_BODY_SIZE: ${CLIENT_MAX_BODY_SIZE:-50m}
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    depends_on:
      - backend
      - websocket

  websocket:
    <<: [*depends_on_configurator, *customizable_image]
    command:
      - node
      - /home/frappe/frappe-bench/apps/frappe/socketio.js
    volumes:
      - sites:/home/frappe/frappe-bench/sites

  queue-short:
    <<: *backend_defaults
    command: bench worker --queue short,default

  queue-long:
    <<: *backend_defaults
    command: bench worker --queue long,default,short

  scheduler:
    <<: *backend_defaults
    command: bench schedule

  db:
    image: ${REGISTRY_MIRROR:-}mariadb:11.8
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 5s
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-123}
      MARIADB_AUTO_UPGRADE: 1
    volumes:
      - db-data:/var/lib/mysql

  redis-cache:
    image: ${REGISTRY_MIRROR:-}redis:6.2-alpine
    restart: unless-stopped

  redis-queue:
    image: ${REGISTRY_MIRROR:-}redis:6.2-alpine
    restart: unless-stopped
    volumes:
      - redis-queue-data:/data

volumes:
  sites:
  db-data:
  redis-queue-data:
